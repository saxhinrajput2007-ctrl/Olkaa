<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OLKaa Chat</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<div class="sidebar">

<h2>Users</h2>

<div id="users"></div>

<button id="logout">Logout</button>

</div>

<div class="chat">

<div id="chatHeader">
Select a user
</div>

<div id="messages"></div>

<div class="sendBox">

<input
type="text"
id="messageInput"
placeholder="Type message..."
>

<button id="sendBtn">
Send
</button>

</div>

</div>

</div>

<script type="module" src="chat.js"></script>

</body>
</html>
