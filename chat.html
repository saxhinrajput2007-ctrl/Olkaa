<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Olkaa Chat</title>

<link rel="stylesheet" href="style.css">

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#101826;
    color:white;
}

.container{
    display:flex;
    height:100vh;
}

.sidebar{
    width:30%;
    background:#182234;
    padding:15px;
    overflow-y:auto;
}

.chat{
    flex:1;
    padding:15px;
}

.user{
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px;
    margin:8px 0;
    cursor:pointer;
    border-radius:8px;
}

.user:hover{
    background:#25344f;
}

.user img{
    width:45px;
    height:45px;
    border-radius:50%;
}

#messages{
    height:300px;
    border:1px solid #555;
    overflow-y:auto;
    padding:10px;
    margin-bottom:10px;
}

#message{
    width:75%;
    padding:10px;
}

#send{
    padding:10px 20px;
}

#logout{
    margin-top:20px;
    width:100%;
    padding:12px;
    background:red;
    color:white;
    border:none;
    border-radius:6px;
}
</style>

</head>

<body>

<div class="container">

<div class="sidebar">

<h2>Users</h2>

<div id="users"></div>

<button id="logout">Logout</button>

</div>

<div class="chat">

<h2 id="chatHeader">Select a user</h2>

<h3>Saved Messages</h3>

<div id="messages"></div>

<input
id="message"
type="text"
placeholder="Type message..."
>

<button id="send">Send</button>

</div>

</div>

<script type="module" src="chat.js"></script>

</body>
</html>
