<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OLKaa Chat</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>Users</h2>

    <div id="users"></div>

    <button id="logout">Logout</button>
  </div>

  <!-- Chat Area -->
  <div class="chat">

    <div id="chatHeader">
      Select a user
    </div>

    <hr>

    <h3>Saved Messages</h3>

    <div id="messages"
      style="height:300px;
      overflow-y:auto;
      border:1px solid #ccc;
      padding:10px;">
    </div>

    <input
      id="message"
      type="text"
      placeholder="Type message..."
    >

    <button id="send">
      Send
    </button>

  </div>

</div>

<script type="module" src="chat.js"></script>

</body>
</html>
