<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OLKO</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:white;
    text-align:center;
}
header{
    background:#111827;
    padding:20px;
}
h1{
    color:#38bdf8;
}
.card{
    margin:30px auto;
    width:90%;
    max-width:500px;
    background:#1e293b;
    padding:20px;
    border-radius:15px;
}
input{
    width:90%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    font-size:16px;
}
button{
    background:#38bdf8;
    color:white;
    border:none;
    padding:12px 25px;
    margin:10px;
    border-radius:25px;
    font-size:18px;
    cursor:pointer;
}
button:hover{
    background:#0284c7;
}
#status{
    margin-top:15px;
    color:#7dd3fc;
}
</style>
</head>

<body>

<header>
<h1>OLKO</h1>
<p>Talk Freely. Connect Safely.</p>
<div class="card">
  <h2>Welcome to OLKO</h2>
  <p>Your chat platform is coming soon.</p>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <button id="signup">Sign Up</button>
  <button id="login">Login</button>

  <p id="status"></p>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
