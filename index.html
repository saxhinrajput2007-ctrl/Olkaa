<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OLKO</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:white;
    text-align:center;
}
header{
    background:#111827;
    padding:20px;
}
h1{
    color:#38bdf8;
}
.card{
    margin:30px auto;
    width:90%;
    max-width:500px;
    background:#1e293b;
    padding:20px;
    border-radius:15px;
}
input{
    width:90%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    font-size:16px;
}
button{
    background:#38bdf8;
    color:white;
    border:none;
    padding:12px 25px;
    margin:10px;
    border-radius:25px;
    font-size:18px;
    cursor:pointer;
}
button:hover{
    background:#0284c7;
}
#status{
    margin-top:15px;
    color:#7dd3fc;
}
</style>
</head>

<body>

<header>
<h1>OLKO</h1>
<p>Talk Freely. Connect Safely.</p>
</header>

<div class="card">
<h2>Welcome to OLKO</h2>
<p>Your chat platform is coming soon.</p>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button id="signup">Sign Up</button>
<button id="login">Login</button>

<p id="status"></p>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDKlI4lNpFWv9c09aro_QGw6oM7nnLz208",
  authDomain: "olkaa-e2804.firebaseapp.com",
  projectId: "olkaa-e2804",
  storageBucket: "olkaa-e2804.firebasestorage.app",
  messagingSenderId: "333255014176",
  appId: "1:333255014176:web:f876db7d113eeb749c4945",
  measurementId: "G-NWW02DCCY6"
};

// IMPORTANT
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// Sign Up
document.getElementById("signup").onclick = () => {

const email = document.getElementById("email").value.trim();
const password = document.getElementById("password").value.trim();

createUserWithEmailAndPassword(auth,email,password)
.then((userCredential)=>{
document.getElementById("status").innerText="✅ Sign Up Successful!";
})
.catch((error)=>{
document.getElementById("status").innerText=error.message;
});

};

// Login
document.getElementById("login").onclick = () => {

const email = document.getElementById("email").value.trim();
const password = document.getElementById("password").value.trim();

signInWithEmailAndPassword(auth,email,password)
.then((userCredential)=>{
document.getElementById("status").innerText="✅ Login Successful!";
})
.catch((error)=>{
document.getElementById("status").innerText=error.message;
});

};

</script>

</body>
</html>
